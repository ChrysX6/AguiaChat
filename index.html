<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Interno — Contabilidade</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="img/logo1.jpg" type="image/x-icon" />
  <style>
    /* ===== CORES BASE ===== */
    :root {
      --navy: #090950;
      --gold: #BF932C;
      --white: #ffffff;
      --navy-light: #0d0d6b;
      --navy-mid: #111177;
      --gold-light: #d4a93a;
      --sidebar-w: 260px;
      --gray-100: #f5f5f7;
      --gray-200: #e8e8f0;
      --gray-400: #9999b3;
      --gray-600: #666680;
      --online: #22c55e;
      --msg-radius: 16px;
      /* Tema claro */
      --bg-app: #f0f0f8;
      --bg-msg: #ffffff;
      --bg-input: #f5f5f7;
      --text-primary: #222;
      --border-color: #e8e8f0;
      --shadow: 0 1px 4px rgba(0,0,0,0.08);
      --chat-header-bg: #ffffff;
      --input-area-bg: #ffffff;
      --msg-own-bg: var(--navy);
      --msg-own-color: #ffffff;
      --msg-other-bg: var(--white);
      --msg-other-color: #222;
      --modal-bg: #ffffff;
      --modal-title-color: var(--navy);
      --modal-text-color: var(--gray-600);
      --modal-btn-cancel-bg: var(--gray-100);
      --modal-btn-cancel-color: var(--gray-600);
      --modal-btn-confirm-bg: var(--navy);
      --modal-btn-confirm-color: var(--white);
      --modal-input-bg: var(--bg-input);
      --modal-input-color: var(--text-primary);
      --modal-input-border: var(--border-color);
    }
    [data-theme="dark"] {
      --bg-app: #0f0f1a;
      --bg-msg: #1c1c3a;
      --bg-input: #2a2a44;
      --text-primary: #e0e0f0;
      --border-color: #3a3a60;
      --shadow: 0 2px 8px rgba(0,0,0,0.6);
      --chat-header-bg: #16162e;
      --input-area-bg: #16162e;
      --msg-own-bg: var(--gold);
      --msg-own-color: #090950;
      --msg-other-bg: #1c1c3a;
      --msg-other-color: #e8e8f8;
      --gray-100: #2a2a3a;
      --gray-200: #3a3a4a;
      --gray-400: #a0a0c0;
      --gray-600: #c0c0dd;
      --modal-bg: #1c1c3a;
      --modal-title-color: var(--gold);
      --modal-text-color: #ccccdd;
      --modal-btn-cancel-bg: #3a3a5a;
      --modal-btn-cancel-color: #eeeeff;
      --modal-btn-confirm-bg: var(--gold);
      --modal-btn-confirm-color: #090950;
      --modal-input-bg: #2a2a44;
      --modal-input-color: #e0e0f0;
      --modal-input-border: #4a4a6a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg-app); color: var(--text-primary); }

    /* LOGIN */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #090950 0%, #0d0d6b 50%, #1a1a99 100%);
      position: fixed; inset: 0; z-index: 999;
    }
    #login-screen.hidden { display: none; }
    .login-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(191,147,44,0.3);
      border-radius: 24px; padding: 48px 40px; width: 380px;
      backdrop-filter: blur(20px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo-area {
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto; overflow: visible; padding: 0;
      background: transparent; border: none; width: auto; height: auto;
    }
    .login-logo-area img {
      max-width: 240px; height: auto; object-fit: contain; border-radius: 0;
      display: block;
    }
    /* removido .login-title e .login-sub */
    .form-group { margin-bottom: 16px; }
    .form-group label { display:block; font-size:12px; font-weight:600; color:var(--gold); text-transform:uppercase; letter-spacing:.6px; margin-bottom:6px; }
    .form-group input {
      width:100%; padding:12px 16px;
      background:rgba(255,255,255,0.06); border:1px solid rgba(191,147,44,0.25);
      border-radius:10px; color:var(--white); font-size:14px; outline:none; transition:.2s;
    }
    .form-group input:focus { border-color:var(--gold); background:rgba(191,147,44,0.08); }
    .form-group input::placeholder { color:rgba(255,255,255,0.3); }
    .btn-login {
      width:100%; padding:13px;
      background:linear-gradient(135deg,var(--gold) 0%,#d4a93a 100%);
      border:none; border-radius:10px; color:var(--navy);
      font-size:15px; font-weight:700; cursor:pointer; transition:.2s; margin-top:8px;
    }
    .btn-login:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(191,147,44,0.4); }
    .login-error { color:#ff6b6b; font-size:13px; text-align:center; margin-top:10px; display:none; }
    .notif-permission-btn {
      background:rgba(255,255,255,0.1); border:1px solid var(--gold);
      color:var(--white); padding:6px 12px; border-radius:6px;
      font-size:12px; cursor:pointer; margin-top:8px; width:100%;
    }
    .notif-permission-btn:hover { background:rgba(191,147,44,0.2); }

    /* APP */
    #app { display:none; height:100vh; flex-direction:row; background:var(--bg-app); }
    #app.visible { display:flex; }

    /* SIDEBAR */
    .sidebar {
      width:var(--sidebar-w); min-width:var(--sidebar-w);
      background:var(--navy); display:flex; flex-direction:column;
      border-right:1px solid rgba(191,147,44,0.15);
    }
    .sidebar-header { padding:20px 16px 16px; border-bottom:1px solid rgba(191,147,44,0.15); }
    .logo-area { 
      display:flex; 
      align-items:center; 
      justify-content: center; /* centraliza a logo */
      margin-bottom:16px; 
    }
    .logo-box {
      width: 100%; height: auto; padding: 8px 12px; border-radius: 0;
      background: transparent; border: none; display:flex; align-items:center; justify-content:center;
      overflow: hidden; flex-shrink:0;
    }
    .logo-box img { max-width: 220px; width:100%; height:auto; object-fit:contain; display:block; }
    /* removido .company-name e .company-sub */
    .theme-toggle {
      background:rgba(255,255,255,0.1); border:1px solid rgba(191,147,44,0.3);
      border-radius:8px; padding:4px 8px; color:var(--white);
      cursor:pointer; font-size:14px; display:inline-flex; align-items:center;
      margin-top:6px; transition:.2s;
    }
    .theme-toggle:hover { background:rgba(191,147,44,0.2); }
    .search-box {
      display:flex; align-items:center; gap:8px;
      background:rgba(255,255,255,0.07); border-radius:8px; padding:7px 10px;
    }
    .search-box input { background:none; border:none; outline:none; color:var(--white); font-size:13px; width:100%; }
    .search-box input::placeholder { color:rgba(255,255,255,0.3); }
    .sidebar-section { padding:12px 16px 4px; }
    .section-label { font-size:10px; font-weight:700; color:var(--gold); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
    .channel-item {
      display:flex; align-items:center; gap:8px; padding:7px 8px;
      border-radius:8px; cursor:pointer; transition:background .15s; margin-bottom:2px;
    }
    .channel-item:hover { background:rgba(255,255,255,0.06); }
    .channel-item.active { background:rgba(191,147,44,0.18); }
    .channel-icon { font-size:15px; width:22px; text-align:center; flex-shrink:0; }
    .channel-name { font-size:13px; color:rgba(255,255,255,0.75); flex:1; }
    .channel-item.active .channel-name { color:var(--white); font-weight:600; }
    .channel-badge {
      background:var(--gold); color:var(--navy); font-size:10px; font-weight:700;
      min-width:18px; height:18px; border-radius:9px;
      display:none; align-items:center; justify-content:center; padding:0 4px;
    }
    .sidebar-footer { margin-top:auto; border-top:1px solid rgba(191,147,44,0.15); padding:12px 16px; }
    .user-card { display:flex; align-items:center; gap:10px; }
    .avatar {
      width:34px; height:34px; border-radius:50%;
      background:linear-gradient(135deg,var(--gold),#d4a93a);
      display:flex; align-items:center; justify-content:center;
      font-size:13px; font-weight:700; color:var(--navy); flex-shrink:0;
    }
    .user-info { flex:1; min-width:0; }
    .user-name { font-size:13px; font-weight:600; color:var(--white); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .user-role { font-size:11px; color:var(--gold); }
    .btn-logout { background:none; border:none; color:rgba(255,255,255,0.4); cursor:pointer; padding:4px; border-radius:6px; transition:.2s; }
    .btn-logout:hover { color:#ff6b6b; background:rgba(255,0,0,0.1); }

    /* MAIN */
    .main { flex:1; display:flex; flex-direction:column; min-width:0; }
    .chat-header {
      background:var(--chat-header-bg); border-bottom:1px solid var(--border-color);
      padding:14px 24px; display:flex; align-items:center; gap:12px;
    }
    /* logo do cabeçalho removida (usada apenas na sidebar/login) */
    .chat-header-icon { font-size:22px; }
    .chat-header-info { flex:1; }
    .chat-header-name { font-size:16px; font-weight:700; color:var(--text-primary); }
    .chat-header-meta { font-size:12px; color:var(--gray-600); margin-top:1px; }
    .online-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--online); margin-right:4px; }
    .sync-status { font-size:11px; color:var(--gray-400); margin-left:8px; }
    .sync-status.syncing { color:var(--gold); }
    .sync-status.error { color:#ef4444; }

    .messages-area {
      flex:1; overflow-y:auto; padding:20px 24px;
      display:flex; flex-direction:column; gap:4px; background:var(--bg-app);
    }
    .messages-area::-webkit-scrollbar { width:4px; }
    .messages-area::-webkit-scrollbar-thumb { background:rgba(9,9,80,0.15); border-radius:2px; }
    .msg-date-divider {
      text-align:center; margin:12px 0; font-size:11px; color:var(--gray-400); font-weight:600; position:relative;
    }
    .msg-date-divider::before, .msg-date-divider::after {
      content:''; position:absolute; top:50%; width:35%; height:1px; background:var(--border-color);
    }
    .msg-date-divider::before { left:0; }
    .msg-date-divider::after { right:0; }
    .msg-group { display:flex; gap:10px; margin-bottom:8px; }
    .msg-group.own { flex-direction:row-reverse; }
    .msg-avatar {
      width:32px; height:32px; border-radius:50%;
      background:linear-gradient(135deg,var(--navy-light),var(--navy-mid));
      display:flex; align-items:center; justify-content:center;
      font-size:12px; font-weight:700; color:var(--white); flex-shrink:0; align-self:flex-end;
    }
    .msg-group.own .msg-avatar { background:linear-gradient(135deg,var(--gold),#d4a93a); color:var(--navy); }
    .msg-content { max-width:65%; display:flex; flex-direction:column; gap:2px; }
    .msg-sender { font-size:11px; font-weight:600; color:var(--text-primary); margin-bottom:2px; margin-left:4px; }
    .msg-group.own .msg-sender { text-align:right; margin-right:4px; }
    .msg-bubble {
      background:var(--msg-other-bg);
      border-radius:var(--msg-radius) var(--msg-radius) var(--msg-radius) 4px;
      padding:10px 14px; box-shadow:var(--shadow);
      font-size:14px; color:var(--msg-other-color);
      line-height:1.5; word-break:break-word;
    }
    .msg-group.own .msg-bubble {
      background:var(--msg-own-bg);
      color:var(--msg-own-color);
      border-radius:var(--msg-radius) var(--msg-radius) 4px var(--msg-radius);
    }
    /* Links em mensagens - garantindo visibilidade no tema escuro */
    .msg-bubble a {
      color: var(--gold);
      text-decoration: underline;
      font-weight: 500;
    }
    .msg-group.own .msg-bubble a {
      color: #d4a93a;
    }
    /* Tema escuro: links ficam dourado claro */
    [data-theme="dark"] .msg-bubble a {
      color: #f0c94d;
      text-decoration-color: #f0c94d;
    }
    [data-theme="dark"] .msg-group.own .msg-bubble a {
      color: #090950;
      text-decoration-color: #090950;
    }
    .msg-time { font-size:10px; color:var(--gray-400); margin:0 4px; align-self:flex-end; }
    .msg-group.own .msg-time { text-align:right; }
    .msg-system { text-align:center; font-size:12px; color:var(--gray-400); margin:8px 0; font-style:italic; }
    .loading-msgs { text-align:center; padding:40px; color:var(--gray-400); font-size:14px; }

    #typing-indicator {
      height:24px; font-size:12px; color:var(--gray-600);
      padding:0 20px; font-style:italic; display:flex; align-items:center;
    }
    #typing-indicator:empty { display:none; }

    .input-area { background:var(--input-area-bg); border-top:1px solid var(--border-color); padding:12px 20px; }
    .input-toolbar { display:flex; align-items:center; gap:6px; margin-bottom:8px; }
    .tool-btn { background:none; border:none; padding:4px 6px; border-radius:6px; cursor:pointer; color:var(--gray-600); font-size:16px; transition:.15s; }
    .tool-btn:hover { background:var(--gray-100); color:var(--navy); }
    .input-row { display:flex; align-items:flex-end; gap:10px; }
    .input-wrap { flex:1; }
    #msg-input {
      width:100%; padding:10px 16px;
      background:var(--bg-input); border:1.5px solid var(--border-color);
      border-radius:20px; font-size:14px; color:var(--text-primary); outline:none;
      resize:none; line-height:1.4; max-height:120px; overflow-y:auto;
      font-family:inherit; transition:border-color .2s;
    }
    #msg-input:focus { border-color:var(--gold); background:var(--white); }
    #msg-input:disabled { opacity:.5; cursor:not-allowed; }
    .btn-send {
      width:40px; height:40px; border-radius:50%;
      background:linear-gradient(135deg,var(--navy),var(--navy-light));
      border:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
      flex-shrink:0; transition:.2s;
    }
    .btn-send:hover { background:linear-gradient(135deg,var(--gold),#d4a93a); transform:scale(1.05); }
    .btn-send:disabled { opacity:.4; cursor:not-allowed; transform:none; }
    .btn-send svg { color:var(--white); }

    /* MODAIS */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.5);
      display:flex; align-items:center; justify-content:center;
      z-index:1000; backdrop-filter:blur(4px);
    }
    .modal-overlay.hidden { display:none; }
    .modal {
      background: var(--modal-bg);
      border-radius:16px; padding:28px; width:420px;
      box-shadow:0 24px 60px rgba(0,0,0,0.2);
    }
    .modal h3 {
      font-size:17px; font-weight:700;
      color: var(--modal-title-color);
      margin-bottom:16px;
    }
    .modal p {
      color: var(--modal-text-color);
      font-size:14px;
      margin-bottom:12px;
    }
    .modal input {
      width:100%; padding:10px 14px;
      border:1.5px solid var(--modal-input-border);
      border-radius:8px; font-size:14px;
      outline:none; margin-bottom:12px;
      font-family:inherit;
      background: var(--modal-input-bg);
      color: var(--modal-input-color);
    }
    .modal input:focus {
      border-color: var(--gold);
    }
    .modal-actions {
      display:flex; gap:8px; justify-content:flex-end;
    }
    .btn-cancel {
      padding:9px 20px;
      background: var(--modal-btn-cancel-bg);
      border:none; border-radius:8px;
      cursor:pointer; font-size:13px; font-weight:600;
      color: var(--modal-btn-cancel-color);
      transition: .2s;
    }
    .btn-cancel:hover {
      filter: brightness(0.9);
    }
    .btn-confirm {
      padding:9px 20px;
      background: var(--modal-btn-confirm-bg);
      border:none; border-radius:8px;
      cursor:pointer; font-size:13px; font-weight:700;
      color: var(--modal-btn-confirm-color);
      transition: .2s;
    }
    .btn-confirm:hover {
      filter: brightness(1.1);
    }

    /* TOAST */
    #toast-container { position:fixed; bottom:24px; right:24px; z-index:2000; display:flex; flex-direction:column; gap:8px; }
    .toast { background:var(--navy); color:var(--white); border-left:4px solid var(--gold); padding:12px 16px; border-radius:10px; font-size:13px; max-width:300px; box-shadow:0 8px 24px rgba(0,0,0,0.3); animation:slide-in .3s ease; }
    .toast strong { color:var(--gold); display:block; margin-bottom:2px; }
    @keyframes slide-in { from { transform:translateX(120%); opacity:0; } to { transform:translateX(0); opacity:1; } }
    @keyframes slide-out { to { transform:translateX(120%); opacity:0; } }

    @media (max-width:768px) {
      .sidebar { width:60px; min-width:60px; }
      .company-name,.company-sub,.channel-name,.section-label,.user-info { display:none; }
      .channel-icon { width:100%; text-align:center; }
      .channel-item { justify-content:center; }
      .logo-box { padding:6px 4px; }
      .logo-box img { max-width:48px; }
      .login-logo-area img { max-width:120px; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-area">
        <!-- Coloque o caminho da sua logo aqui -->
        <img src="img/logo1.jpg" alt="Logo" />
      </div>
      <!-- removido texto -->
    </div>
    <div class="form-group">
      <label>Usuário</label>
      <input type="text" id="input-user" placeholder="Seu usuário" autocomplete="off" />
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="input-pass" placeholder="Sua senha" />
    </div>
    <button class="btn-login" id="btn-login" onclick="doLogin()">Entrar</button>
    <button class="notif-permission-btn" onclick="requestNotificationPermission()">🔔 Ativar Notificações</button>
    <div class="login-error" id="login-error">Usuário ou senha incorretos.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav class="sidebar">
    <div class="sidebar-header">
      <div class="logo-area">
        <div class="logo-box">
          <img src="img/logo1.jpg" alt="Logo" />
        </div>
      </div>
      <!-- removido texto -->
      <div style="display:flex; gap:8px; align-items:center; margin-top: 8px;">
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        <div class="search-box" style="flex:1;">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" placeholder="Buscar canal..." oninput="filterChannels(this.value)" />
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="section-label">Departamentos</div>
      <div id="channel-list">
        <div class="channel-item active" data-ch="geral" onclick="switchChannel('geral',this)">
          <span class="channel-icon">💬</span><span class="channel-name">Geral</span>
          <span class="channel-badge" id="badge-geral"></span>
        </div>
        <div class="channel-item" data-ch="dp" onclick="switchChannel('dp',this)">
          <span class="channel-icon">👥</span><span class="channel-name">Departamento Pessoal</span>
          <span class="channel-badge" id="badge-dp"></span>
        </div>
        <div class="channel-item" data-ch="fiscal" onclick="switchChannel('fiscal',this)">
          <span class="channel-icon">📋</span><span class="channel-name">Fiscal</span>
          <span class="channel-badge" id="badge-fiscal"></span>
        </div>
        <div class="channel-item" data-ch="societario" onclick="switchChannel('societario',this)">
          <span class="channel-icon">⚖️</span><span class="channel-name">Societário</span>
          <span class="channel-badge" id="badge-societario"></span>
        </div>
        <div class="channel-item" data-ch="parcelamentos" onclick="switchChannel('parcelamentos',this)">
          <span class="channel-icon">📅</span><span class="channel-name">Parcelamentos</span>
          <span class="channel-badge" id="badge-parcelamentos"></span>
        </div>
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="user-card">
        <div class="avatar" id="sidebar-avatar">?</div>
        <div class="user-info">
          <div class="user-name" id="sidebar-uname">—</div>
          <div class="user-role" id="sidebar-role">—</div>
        </div>
        <button class="btn-logout" onclick="doLogout()" title="Sair">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </div>
  </nav>

  <main class="main">
    <div class="chat-header">
      <span class="chat-header-icon" id="hdr-icon">💬</span>
      <div class="chat-header-info">
        <div class="chat-header-name" id="hdr-name">Geral</div>
        <div class="chat-header-meta">
          <span class="online-dot"></span>
          <span id="hdr-meta">Canal principal</span>
          <span class="sync-status" id="sync-status"></span>
        </div>
      </div>
    </div>

    <div class="messages-area" id="messages-area">
      <div class="loading-msgs">Carregando mensagens...</div>
    </div>
    <div id="typing-indicator"></div>

    <div class="input-area">
      <div class="input-toolbar">
        <button class="tool-btn" onclick="openLinkModal()" title="Inserir link">🔗</button>
        <button class="tool-btn" onclick="addEmoji('😊')">😊</button>
        <button class="tool-btn" onclick="addEmoji('👍')">👍</button>
        <button class="tool-btn" onclick="addEmoji('❤️')">❤️</button>
        <button class="tool-btn" onclick="addEmoji('✅')">✅</button>
        <button class="tool-btn" onclick="addEmoji('⚠️')">⚠️</button>
        <button class="tool-btn" onclick="addEmoji('📌')">📌</button>
      </div>
      <div class="input-row">
        <div class="input-wrap">
          <textarea id="msg-input" rows="1" placeholder="Mensagem..."
            onkeydown="handleKey(event)" oninput="handleInput(event)"></textarea>
        </div>
        <button class="btn-send" id="btn-send" onclick="sendMessage()">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </main>
</div>

<!-- MODAL LINK -->
<div class="modal-overlay hidden" id="link-modal">
  <div class="modal">
    <h3>🔗 Inserir Link</h3>
    <input type="text" id="link-text" placeholder="Texto do link" />
    <input type="url" id="link-url" placeholder="https://..." />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeLinkModal()">Cancelar</button>
      <button class="btn-confirm" onclick="insertLink()">Inserir</button>
    </div>
  </div>
</div>

<!-- MODAL SENHA DO DEPARTAMENTO -->
<div class="modal-overlay hidden" id="pass-modal">
  <div class="modal">
    <h3>🔒 Senha do departamento</h3>
    <p>Digite a senha para acessar este canal.</p>
    <input type="password" id="channel-pass" placeholder="Senha" />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closePassModal()">Cancelar</button>
      <button class="btn-confirm" onclick="checkChannelPassword()">Entrar</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
// ═══════════════════════════════════════════════
// CONFIGURAÇÕES
// ═══════════════════════════════════════════════
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxpqJ4GeFQYf0MBE4R5cnCbB6g7vAMQp8Qa4BTk2RLUI-pcYukmR2m3ibGUiS5T19M/exec';

// Usuários
const USERS = {
  martins:  { pass: 'Aguia2025@', name: 'Victor Martins', role: 'Admin' },
  chrystian: { pass: 'Aguia2025@', name: 'Chrystian Gabriel', role: 'Admin' },
  ryan:    { pass: 'Aguia2025@', name: 'Ryan Alisson', role: 'Fiscal' },
  jessica:  { pass: 'Aguia2025@', name: 'Jessica Firmino', role: 'DP' },
  ananda:   { pass: 'Aguia2025@', name: 'Ananda', role: 'Contabil' },
  felipe:   { pass: 'Aguia2025@', name: 'Felipe', role: 'Contabil' },
  marcio:   { pass: 'Aguia2025@', name: 'Marcio', role: 'Contabil' },
  andrea:   { pass: 'Aguia2025@', name: 'Andrea', role: 'Contabil' },
  nicoly:   { pass: 'Aguia2025@', name: 'Nicoly', role: 'Contabil' },
  lucas:   { pass: 'Aguia2025@', name: 'Lucas', role: 'Societario' },
  tania:   { pass: 'Aguia2025@', name: 'Tania', role: 'Societario' },
  marcia:   { pass: 'Aguia2025@', name: 'Marcia', role: 'Contadora' },
};

// Senhas por departamento
const CHANNEL_PASSWORDS = {
  dp:         'dp@2025',
  fiscal:     'fiscal@2025',
  societario:'societario@2025',
  parcelamentos:'parc@2025',
};

const CHANNELS = {
  geral:         { name: 'Geral',            icon: '💬', meta: 'Canal principal da equipe' },
  dp:            { name: 'DP',  icon: '👥', meta: 'Departamento Pessoal' },
  fiscal:        { name: 'Fiscal',            icon: '📋', meta: 'Departamento Fiscal' },
  societario:   { name: 'Societário',       icon: '⚖️', meta: 'Departamento Societário' },
  parcelamentos: { name: 'Parcelamentos',     icon: '📅', meta: 'Controle de Parcelamentos' },
};

// ═══════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════
let currentUser  = null;
let currentChannel = 'geral';
let knownMsgIds  = new Set();
let pollTimer    = null;
let typingTimer  = null;
let isTyping     = false;
let channelUnlocked = false;

const badges = {};
Object.keys(CHANNELS).forEach(k => badges[k] = 0);

// ═══════════════════════════════════════════════
// NOTIFICAÇÕES DESKTOP
// ═══════════════════════════════════════════════
function requestNotificationPermission() {
  if (!('Notification' in window)) {
    alert('Este navegador não suporta notificações.');
    return;
  }
  if (Notification.permission === 'granted') {
    showToast('Notificações', 'Já estão ativadas! ✅');
    return;
  }
  if (Notification.permission === 'denied') {
    alert('As notificações foram bloqueadas por você. Por favor, permita nas configurações do navegador.');
    return;
  }
  // permission === 'default'
  Notification.requestPermission().then(perm => {
    if (perm === 'granted') {
      showToast('Notificações', 'Ativadas com sucesso! 🔔');
      new Notification('✅ Notificações ativadas', {
        body: 'Você receberá alertas de novas mensagens.',
        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">💬</text></svg>'
      });
    } else {
      alert('Você precisa permitir notificações para receber alertas.');
    }
  });
}

function notifyNewMessage(user, message) {
  if (!('Notification' in window)) return;
  if (Notification.permission !== 'granted') return;
  // if (!document.hidden) return; // opcional

  const channelName = CHANNELS[currentChannel]?.name || currentChannel;
  const options = {
    body: `${user}: ${message.slice(0, 60)}${message.length > 60 ? '…' : ''}`,
    icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">💬</text></svg>',
    tag: 'chat-message',
    requireInteraction: true
  };
  try {
    const n = new Notification('💬 Nova mensagem no ' + channelName, options);
    setTimeout(() => n.close(), 8000);
  } catch (e) {
    console.error('Erro ao criar notificação:', e);
  }
}

// ═══════════════════════════════════════════════
// MODO NOTURNO
// ═══════════════════════════════════════════════
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.querySelector('.theme-toggle').textContent = next === 'dark' ? '☀️' : '🌙';
}
function loadTheme() {
  const saved = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  document.querySelector('.theme-toggle').textContent = saved === 'dark' ? '☀️' : '🌙';
}

// ═══════════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════════
function doLogin() {
  const uid  = document.getElementById('input-user').value.trim().toLowerCase();
  const pass = document.getElementById('input-pass').value;
  const err  = document.getElementById('login-error');
  if (USERS[uid] && USERS[uid].pass === pass) {
    currentUser = { id: uid, ...USERS[uid] };
    err.style.display = 'none';
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    initApp();
  } else {
    err.style.display = 'block';
    document.getElementById('input-pass').value = '';
  }
}
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('login-screen').classList.contains('hidden')) {
    doLogin();
  }
});
function doLogout() {
  clearInterval(pollTimer);
  currentUser = null;
  knownMsgIds.clear();
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('input-user').value = '';
  document.getElementById('input-pass').value = '';
}
function initApp() {
  loadTheme();
  document.getElementById('sidebar-uname').textContent = currentUser.name;
  document.getElementById('sidebar-role').textContent  = currentUser.role;
  document.getElementById('sidebar-avatar').textContent = currentUser.name[0].toUpperCase();
  switchChannel('geral', document.querySelector('[data-ch="geral"]'));
}

// ═══════════════════════════════════════════════
// CANAIS com senha
// ═══════════════════════════════════════════════
let pendingChannel = null;
let pendingElement = null;

function switchChannel(ch, el) {
  if (ch === 'geral') {
    enterChannel(ch, el);
    return;
  }
  if (channelUnlocked && currentChannel === ch) {
    enterChannel(ch, el);
    return;
  }
  if (sessionStorage.getItem('unlocked_' + ch) === 'true') {
    enterChannel(ch, el);
    return;
  }
  pendingChannel = ch;
  pendingElement = el;
  document.getElementById('pass-modal').classList.remove('hidden');
  document.getElementById('channel-pass').value = '';
  document.getElementById('channel-pass').focus();
}

function closePassModal() {
  document.getElementById('pass-modal').classList.add('hidden');
  pendingChannel = null;
  pendingElement = null;
}

function checkChannelPassword() {
  const pass = document.getElementById('channel-pass').value.trim();
  const ch = pendingChannel;
  if (CHANNEL_PASSWORDS[ch] && CHANNEL_PASSWORDS[ch] === pass) {
    sessionStorage.setItem('unlocked_' + ch, 'true');
    closePassModal();
    enterChannel(ch, pendingElement);
  } else {
    alert('Senha incorreta!');
    document.getElementById('channel-pass').value = '';
    document.getElementById('channel-pass').focus();
  }
}

function enterChannel(ch, el) {
  clearInterval(pollTimer);
  currentChannel = ch;
  channelUnlocked = true;
  knownMsgIds.clear();

  document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
  if (el) el.classList.add('active');

  const info = CHANNELS[ch];
  document.getElementById('hdr-icon').textContent = info.icon;
  document.getElementById('hdr-name').textContent = info.name;
  document.getElementById('hdr-meta').textContent = info.meta;

  badges[ch] = 0;
  const badge = document.getElementById('badge-' + ch);
  if (badge) badge.style.display = 'none';

  document.getElementById('messages-area').innerHTML = '<div class="loading-msgs">Carregando mensagens...</div>';
  document.getElementById('typing-indicator').textContent = '';
  loadMessages(true);
  pollTimer = setInterval(() => {
    loadMessages(false);
    fetchTypingStatus();
  }, 4000);
}

// ═══════════════════════════════════════════════
// CARREGAR MENSAGENS
// ═══════════════════════════════════════════════
async function loadMessages(initial) {
  setSyncStatus('syncing', '↻ sincronizando');
  try {
    const url = `${SHEETS_URL}?action=get_messages&channel=${currentChannel}&limit=100&t=${Date.now()}`;
    const res  = await fetch(url);
    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'Erro ao buscar mensagens');

    const msgs = data.messages || [];
    const isFirst = initial || knownMsgIds.size === 0;

    let hasNew = false;
    let newMsg = null;
    msgs.forEach(m => {
      if (!knownMsgIds.has(m.id)) {
        if (m.user !== currentUser.id && !isFirst) {
          hasNew = true;
          newMsg = m;
        }
        knownMsgIds.add(m.id);
      }
    });

    renderMessages(msgs);
    if (isFirst) scrollToBottom();
    if (hasNew && newMsg) {
      playPing();
      notifyNewMessage(newMsg.user, newMsg.message);
      scrollToBottom();
    }
    setSyncStatus('', '');
  } catch(err) {
    setSyncStatus('error', '⚠ sem conexão');
    if (initial) {
      document.getElementById('messages-area').innerHTML =
        '<div class="msg-system">⚠️ Não foi possível carregar mensagens. Verifique sua conexão.</div>';
    }
  }
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function renderMessages(msgs) {
  const area = document.getElementById('messages-area');
  const wasBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 60;
  if (!msgs.length) {
    area.innerHTML = '<div class="msg-system">Nenhuma mensagem ainda. Seja o primeiro! 💬</div>';
    return;
  }
  let html = '';
  let lastDate = '';
  msgs.forEach(m => {
    const dateLabel = m.date || 'Hoje';
    if (dateLabel !== lastDate) {
      html += `<div class="msg-date-divider">${dateLabel}</div>`;
      lastDate = dateLabel;
    }
    const own = m.user === currentUser.id;
    const initials = (m.user || '?')[0].toUpperCase();
    const text = linkify(escapeHtml(m.message));
    html += `
      <div class="msg-group ${own ? 'own' : ''}">
        <div class="msg-avatar">${initials}</div>
        <div class="msg-content">
          <div class="msg-sender">${escapeHtml(m.user || '')}</div>
          <div class="msg-bubble">${text}</div>
          <div class="msg-time">${m.time || ''}</div>
        </div>
      </div>`;
  });
  area.innerHTML = html;
  if (wasBottom) scrollToBottom();
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function linkify(text) {
  return text.replace(/(https?:\/\/[^\s&]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
}
function scrollToBottom() {
  const area = document.getElementById('messages-area');
  setTimeout(() => { area.scrollTop = area.scrollHeight; }, 60);
}

// ═══════════════════════════════════════════════
// DIGITAÇÃO
// ═══════════════════════════════════════════════
let typingTimeout = null;

function handleInput(e) {
  autoResize(e.target);
  const text = e.target.value.trim();
  if (text.length > 0) {
    if (!isTyping) {
      isTyping = true;
      sendTypingStatus(true);
    }
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
      isTyping = false;
      sendTypingStatus(false);
    }, 3000);
  } else {
    isTyping = false;
    sendTypingStatus(false);
    clearTimeout(typingTimeout);
  }
}

async function sendTypingStatus(active) {
  if (!currentUser) return;
  try {
    await fetch(SHEETS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'set_typing',
        user: currentUser.id,
        channel: currentChannel,
        active: active
      })
    });
  } catch(e) {}
}

async function fetchTypingStatus() {
  try {
    const url = `${SHEETS_URL}?action=get_typing&channel=${currentChannel}&t=${Date.now()}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.success && data.typing) {
      const typingUsers = data.typing.filter(u => u !== currentUser.id);
      const indicator = document.getElementById('typing-indicator');
      if (typingUsers.length > 0) {
        const names = typingUsers.map(u => USERS[u]?.name || u).join(', ');
        indicator.textContent = `${names} ${typingUsers.length === 1 ? 'está' : 'estão'} digitando...`;
      } else {
        indicator.textContent = '';
      }
    }
  } catch(e) {}
}

// ═══════════════════════════════════════════════
// ENVIAR MENSAGEM
// ═══════════════════════════════════════════════
async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text  = input.value.trim();
  if (!text) return;

  input.disabled = true;
  document.getElementById('btn-send').disabled = true;

  try {
    const body = {
      action:  'save_message',
      channel: currentChannel,
      user:    currentUser.id,
      message: text,
      type:    'texto',
    };
    await fetch(SHEETS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    input.value = '';
    input.style.height = 'auto';
    isTyping = false;
    clearTimeout(typingTimeout);
    sendTypingStatus(false);
    setTimeout(() => loadMessages(false), 800);
  } catch(err) {
    showToast('Erro', 'Não foi possível enviar a mensagem.');
  } finally {
    input.disabled = false;
    document.getElementById('btn-send').disabled = false;
    input.focus();
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ═══════════════════════════════════════════════
// DEMAIS FUNÇÕES
// ═══════════════════════════════════════════════
function openLinkModal() { document.getElementById('link-modal').classList.remove('hidden'); document.getElementById('link-text').focus(); }
function closeLinkModal() { document.getElementById('link-modal').classList.add('hidden'); document.getElementById('link-text').value = ''; document.getElementById('link-url').value = ''; }
function insertLink() {
  const text = document.getElementById('link-text').value.trim();
  const url  = document.getElementById('link-url').value.trim();
  if (!url) { alert('Informe a URL.'); return; }
  const input = document.getElementById('msg-input');
  input.value += (input.value ? ' ' : '') + (text ? `${text} (${url})` : url);
  closeLinkModal();
  input.focus();
}
function addEmoji(em) { const el = document.getElementById('msg-input'); el.value += em; el.focus(); }
function filterChannels(q) {
  q = q.toLowerCase();
  document.querySelectorAll('.channel-item').forEach(item => {
    const name = item.querySelector('.channel-name')?.textContent.toLowerCase() || '';
    item.style.display = name.includes(q) ? '' : 'none';
  });
}
function showToast(title, body) {
  const c = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<strong>${title}</strong>${body}`;
  c.appendChild(el);
  setTimeout(() => { el.style.animation = 'slide-out .3s ease forwards'; setTimeout(() => el.remove(), 300); }, 4000);
}
function setSyncStatus(cls, text) {
  const el = document.getElementById('sync-status');
  el.className = 'sync-status ' + cls;
  el.textContent = text;
}
function playPing() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(880, ctx.currentTime);
    o.frequency.setValueAtTime(1100, ctx.currentTime + 0.08);
    g.gain.setValueAtTime(0.35, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
    o.start(); o.stop(ctx.currentTime + 0.35);
  } catch(e) {}
}
</script>
